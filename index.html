<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="left-container">
                <h3 class="heading">HOME</h3>
                <div class="innerLeft">
                        <div id="homescore">0</div>

                </div>
                <div class="btn-container">
                    <button class="btn" onclick="homeOne()">+1</button>
                    <button class="btn" onclick="homeTwo()">+2</button>
                    <button class="btn" onclick="homeThree()">+3</button>
                </div>
            </div>
            
            <div class="right-container">
                <h3 class="heading">GUEST</h3>
                <div class="innerRight">
                        <div id="guestscore">0</div>

                </div>
                <div class="btn-container">
                    <button class="btn" onclick="guestOne()">+1</button>
                    <button class="btn" onclick="guestTwo()">+2</button>
                    <button class="btn" onclick="guestThree()">+3</button>
                    
                </div>    
            </div>
                <div class="reset-container">
                    <button onclick="resetGame()">Reset Game</button>
                </div>
        </div>
  
        <script src="index.js"></script>
    </body>
</html>
